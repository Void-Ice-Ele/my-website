<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vidya Education Group — Diploma Engineering, Patna</title>
<meta name="description" content="Vidya Education Group — AICTE-format diploma engineering programmes in Civil, Mechanical, Electrical, Electronics, Computer Science and Mining Engineering.">
<meta property="og:title" content="Vidya Education Group">
<meta property="og:description" content="Diploma engineering education in Patna, Bihar since 1985.">
<meta property="og:type" content="website">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='46' fill='%2316305C'/%3E%3Ccircle cx='50' cy='50' r='38' fill='none' stroke='%23E8A33D' stroke-width='3'/%3E%3Ctext x='50' y='58' text-anchor='middle' font-family='Georgia,serif' font-weight='700' font-size='26' fill='%23E8A33D'%3EVEG%3C/text%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Lora:wght@500;600;700&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script type="application/ld+json" id="ldjson"></script>
<style>
  :root{
    --navy:#16305C; --navy-dark:#0E1F3D; --marigold:#E8A33D; --marigold-dark:#C77F1D;
    --paper:#F6F3EC; --paper-dark:#EAE4D3; --ink:#201D1A; --ink-soft:#544F46;
    --leaf:#1F7A4D; --brick:#A6432E; --line:rgba(22,48,92,0.16);
    --shadow:0 2px 14px rgba(22,48,92,0.10); --shadow-lg:0 12px 32px rgba(14,31,61,0.22); --radius:6px;
  }
  *{box-sizing:border-box;}
  html{scroll-behavior:smooth;overflow-x:hidden;width:100%;}
  body{margin:0;background:var(--paper);color:var(--ink);font-family:'Inter',sans-serif;line-height:1.55;overflow-x:hidden;width:100%;word-wrap:break-word;overflow-wrap:break-word;}
  h1,h2,h3,h4{font-family:'Lora',serif;color:var(--navy);margin:0 0 .4em 0;line-height:1.2;}
  p{margin:0 0 1em 0;}
  a{color:inherit;}
  img{max-width:100%;display:block;}
  button{font-family:inherit;cursor:pointer;}
  code{background:var(--paper-dark);padding:1px 6px;border-radius:3px;font-size:.9em;}
  .container{max-width:1120px;margin:0 auto;padding:0 24px;}
  .eyebrow{display:inline-block;font-family:'Inter',sans-serif;font-weight:700;font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--marigold-dark);margin-bottom:10px;}
  :focus-visible{outline:3px solid var(--marigold);outline-offset:2px;}
  .skip-link{position:absolute;left:-999px;top:0;background:var(--navy);color:#fff;padding:12px 20px;z-index:999;border-radius:0 0 6px 0;font-weight:700;}
  .skip-link:focus{left:0;}
  @media (prefers-reduced-motion: reduce){ *{animation:none !important;transition:none !important;} html{scroll-behavior:auto;} }
  .reveal{opacity:0;transform:translateY(22px);transition:opacity .65s ease, transform .65s ease;}
  .reveal.in-view{opacity:1;transform:translateY(0);}

  .seal{border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;position:relative;}
  .seal svg{width:100%;height:100%;}
  .seal-spin{animation:seal-in 900ms ease-out;}
  @keyframes seal-in{from{transform:rotate(-25deg) scale(.85);opacity:0;}to{transform:rotate(0) scale(1);opacity:1;}}
  .corner-mark{position:absolute;width:22px;height:22px;border:2px solid rgba(232,163,61,.65);}
  .corner-mark.tl{top:-10px;left:-10px;border-right:none;border-bottom:none;}
  .corner-mark.tr{top:-10px;right:-10px;border-left:none;border-bottom:none;}
  .corner-mark.bl{bottom:-10px;left:-10px;border-right:none;border-top:none;}
  .corner-mark.br{bottom:-10px;right:-10px;border-left:none;border-top:none;}

  .ticker-bar{background:var(--marigold);border-bottom:1px solid var(--marigold-dark);overflow:hidden;position:relative;}
  .ticker-bar .container{display:flex;align-items:center;gap:14px;padding:8px 24px;}
  .ticker-tag{background:var(--navy-dark);color:#fff;font-size:10.5px;font-weight:800;letter-spacing:.06em;text-transform:uppercase;padding:3px 10px;border-radius:20px;flex-shrink:0;}
  .ticker-viewport{overflow:hidden;flex:1;white-space:nowrap;}
  .ticker-track{display:inline-block;padding-left:100%;animation:ticker-scroll 26s linear infinite;color:var(--navy-dark);font-size:13.5px;font-weight:600;}
  .ticker-bar:hover .ticker-track{animation-play-state:paused;}
  @keyframes ticker-scroll{from{transform:translateX(0);}to{transform:translateX(-100%);}}
  .ticker-track a{margin-right:48px;color:inherit;text-decoration:none;border-bottom:1px dashed rgba(14,31,61,.4);padding-bottom:1px;}
  .ticker-track a:hover{border-bottom-style:solid;}

  header.site-header{background:var(--paper);border-bottom:1px solid var(--line);position:sticky;top:0;z-index:50;}
  .trust-strip{background:#fff;border-bottom:1px solid var(--line);}
  .trust-strip .container{display:flex;flex-wrap:wrap;gap:8px 26px;justify-content:center;padding:9px 24px;}
  .trust-badge{display:flex;align-items:center;gap:6px;font-size:12px;font-weight:700;color:var(--ink-soft);letter-spacing:.01em;}
  .trust-badge svg{width:14px;height:14px;color:var(--leaf);flex-shrink:0;}
  .header-row{display:flex;align-items:center;justify-content:space-between;padding:14px 24px;gap:16px;}
  .brand{display:flex;align-items:center;gap:12px;text-decoration:none;}
  .brand .seal{width:44px;height:44px;}
  .brand-text .name{font-family:'Lora',serif;font-weight:700;font-size:18px;color:var(--navy);}
  .brand-text .tagline{font-size:11.5px;color:var(--ink-soft);}
  nav.main-nav{display:flex;align-items:center;gap:20px;flex-wrap:wrap;}
  nav.main-nav a{font-size:14px;font-weight:600;text-decoration:none;color:var(--ink);border-bottom:2px solid transparent;padding-bottom:3px;transition:color .15s ease, border-color .15s ease;}
  nav.main-nav a:hover{border-bottom-color:var(--marigold);}
  nav.main-nav a.active{color:var(--navy);border-bottom-color:var(--marigold);}
  .nav-cta{background:var(--navy);color:#fff !important;padding:9px 16px;border-radius:3px;border-bottom:none !important;}
  .nav-cta:hover{background:var(--navy-dark);}
  #navToggle{display:none;background:none;border:2px solid var(--navy);border-radius:4px;width:40px;height:36px;z-index:57;position:relative;}
  #navToggle span{display:block;width:18px;height:2px;background:var(--navy);margin:4px auto;}
  .nav-close{display:none;}
  .nav-backdrop{display:none;}
  @media (max-width:1000px){
    nav.main-nav{position:fixed;top:0;right:-300px;height:100vh;width:280px;background:#fff;flex-direction:column;align-items:stretch;padding:84px 26px 26px;gap:6px;box-shadow:-8px 0 28px rgba(14,31,61,.22);transition:right .32s ease;z-index:58;overflow-y:auto;}
    nav.main-nav a{padding:12px 4px;border-bottom:1px solid var(--line);}
    nav.main-nav.open{right:0;}
    nav.main-nav .nav-cta{margin-top:10px;text-align:center;}
    #navToggle{display:block;}
    .nav-close{display:block;position:absolute;top:16px;right:20px;z-index:59;background:none;border:none;font-size:26px;color:var(--navy);}
    .nav-backdrop{display:block;position:fixed;inset:0;background:rgba(14,31,61,.45);opacity:0;visibility:hidden;transition:opacity .3s ease;z-index:56;}
    .nav-backdrop.open{opacity:1;visibility:visible;}
  }

  .hero{background:linear-gradient(180deg,var(--navy) 0%,var(--navy-dark) 100%);color:#fff;padding:64px 0 0;position:relative;overflow:hidden;}
  .hero::before{content:'';position:absolute;inset:0;background-image:linear-gradient(rgba(255,255,255,.05) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.05) 1px,transparent 1px);background-size:34px 34px;pointer-events:none;}
  .hero-inner{display:grid;grid-template-columns:1.3fr 1fr;gap:40px;align-items:center;padding-bottom:48px;position:relative;}
  @media (max-width:760px){
    .hero-inner{grid-template-columns:1fr;text-align:center;gap:28px;}
    .hero .lede{margin-left:auto;margin-right:auto;}
    .hero-ctas{justify-content:center;}
    .hero-seal-wrap .seal{width:130px;height:130px;}
  }
  .hero h1{color:#fff;font-size:42px;margin-bottom:16px;}
  .hero .lede{color:#D9E1EE;font-size:17px;max-width:520px;margin-bottom:26px;}
  .hero-ctas{display:flex;gap:14px;flex-wrap:wrap;}
  .btn{display:inline-block;padding:12px 22px;border-radius:3px;font-weight:700;font-size:14.5px;text-decoration:none;border:2px solid transparent;transition:transform .15s ease, box-shadow .15s ease;}
  .btn:hover{transform:translateY(-2px);box-shadow:var(--shadow-lg);}
  .btn-primary{background:var(--marigold);color:var(--navy-dark);}
  .btn-primary:hover{background:var(--marigold-dark);color:#fff;}
  .btn-outline{border-color:rgba(255,255,255,.55);color:#fff;background:transparent;}
  .btn-outline:hover{background:rgba(255,255,255,.12);}
  .hero-seal-wrap{display:flex;justify-content:center;position:relative;}
  .hero-seal-wrap .seal{width:190px;height:190px;}
  .stat-strip{background:var(--navy-dark);border-top:1px solid rgba(255,255,255,.12);}
  .stat-row{display:flex;justify-content:space-between;padding:22px 0;flex-wrap:wrap;gap:18px;}
  .stat{text-align:center;flex:1;min-width:120px;}
  .stat .num{font-family:'Lora',serif;font-weight:700;font-size:24px;color:var(--marigold);}
  .stat .label{font-size:11.5px;letter-spacing:.06em;text-transform:uppercase;color:#B9C4D8;margin-top:2px;}

  section{padding:72px 0;}
  .section-head{max-width:640px;margin-bottom:40px;}
  .section-head p{color:var(--ink-soft);font-size:15.5px;}

  .quicklinks-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:14px;}
  .quicklink-card{background:#fff;border:1px solid var(--line);border-radius:var(--radius);padding:18px 10px;text-align:center;text-decoration:none;color:var(--navy);font-size:12px;font-weight:700;box-shadow:var(--shadow);transition:transform .2s ease, box-shadow .2s ease;}
  .quicklink-card:hover{transform:translateY(-3px);box-shadow:var(--shadow-lg);}
  .quicklink-card svg{width:24px;height:24px;margin:0 auto 8px;display:block;color:var(--brick);}
  @media (max-width:880px){.quicklinks-grid{grid-template-columns:repeat(3,1fr);}}
  @media (max-width:520px){.quicklinks-grid{grid-template-columns:repeat(2,1fr);}}

  .leader-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:24px;}
  .leader-card{background:#fff;border:1px solid var(--line);border-radius:var(--radius);padding:26px 24px;box-shadow:var(--shadow);text-align:center;transition:transform .2s ease, box-shadow .2s ease;}
  .leader-card:hover{transform:translateY(-3px);box-shadow:var(--shadow-lg);}
  .leader-photo{width:96px;height:96px;border-radius:50%;margin:0 auto 14px;overflow:hidden;background:var(--navy);border:3px solid var(--paper-dark);display:flex;align-items:center;justify-content:center;color:#fff;font-family:'Lora',serif;font-weight:700;font-size:28px;}
  .leader-photo img{width:100%;height:100%;object-fit:cover;}
  .leader-name{font-weight:700;font-size:15.5px;color:var(--navy);margin-top:2px;}
  .leader-title{font-size:12px;color:var(--marigold-dark);font-weight:700;text-transform:uppercase;letter-spacing:.05em;margin-bottom:12px;}
  .leader-message{font-size:14px;color:var(--ink-soft);text-align:left;margin-bottom:0;}
  .vision-mission{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-top:28px;}
  .vm-card{background:#fff;border:1px solid var(--line);border-left:4px solid var(--leaf);border-radius:var(--radius);padding:20px 22px;transition:transform .2s ease, box-shadow .2s ease;}
  .vm-card:hover{transform:translateY(-3px);box-shadow:var(--shadow);}
  .vm-card h4{font-size:15px;text-transform:uppercase;letter-spacing:.06em;color:var(--leaf);}
  .vm-card p{color:var(--ink-soft);font-size:14.5px;margin-bottom:0;}
  @media (max-width:880px){.leader-grid{grid-template-columns:1fr 1fr;}}
  @media (max-width:720px){.vision-mission{grid-template-columns:1fr;}}
  @media (max-width:560px){.leader-grid{grid-template-columns:1fr;}}

  .achieve-list{display:flex;flex-direction:column;gap:14px;}
  .achieve-row{display:flex;gap:20px;align-items:flex-start;background:#fff;border:1px solid var(--line);border-radius:var(--radius);padding:18px 20px;box-shadow:var(--shadow);}
  .achieve-year{font-family:'Lora',serif;font-weight:700;font-size:20px;color:var(--marigold-dark);min-width:70px;flex-shrink:0;}
  .achieve-title{font-weight:700;font-size:15px;color:var(--navy);}
  .achieve-desc{font-size:13.5px;color:var(--ink-soft);margin-top:4px;}

  .course-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:22px;}
  .course-card{position:relative;background:#fff;border:1px solid var(--line);border-radius:var(--radius);padding:24px 22px;overflow:hidden;box-shadow:var(--shadow);transition:transform .22s ease, box-shadow .22s ease;}
  .course-card:hover{transform:translateY(-4px);box-shadow:var(--shadow-lg);}
  .course-card .code-mark{position:absolute;right:-6px;top:-16px;font-family:'Lora',serif;font-weight:700;font-size:76px;color:var(--paper-dark);z-index:0;user-select:none;}
  .course-card .code-tag{display:inline-block;background:var(--navy);color:#fff;font-size:11.5px;font-weight:700;letter-spacing:.06em;padding:3px 10px;border-radius:20px;position:relative;z-index:1;margin-bottom:10px;}
  .course-card h3{font-size:18px;position:relative;z-index:1;}
  .course-card .meta{font-size:12.5px;color:var(--ink-soft);font-weight:600;margin-bottom:10px;position:relative;z-index:1;}
  .course-card p{font-size:14px;color:var(--ink-soft);position:relative;z-index:1;margin:0;}
  @media (max-width:880px){.course-grid{grid-template-columns:1fr 1fr;}}
  @media (max-width:560px){.course-grid{grid-template-columns:1fr;}}

  .admissions{background:var(--navy);color:#fff;border-radius:var(--radius);padding:40px;position:relative;overflow:hidden;}
  .admissions .eyebrow{color:var(--marigold);}
  .admissions h2{color:#fff;}
  .admissions .disclaimer{font-size:12px;color:#B9C4D8;font-style:italic;margin-top:18px;}
  .timeline{list-style:none;margin:22px 0 0;padding:0;display:grid;grid-template-columns:repeat(5,1fr);gap:14px;}
  .timeline li{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.18);border-radius:4px;padding:16px 14px;transition:background .2s ease;}
  .timeline li:hover{background:rgba(255,255,255,.14);}
  .timeline .t-date{font-weight:700;color:var(--marigold);font-size:13.5px;}
  .timeline .t-label{font-size:12.5px;color:#D9E1EE;margin-top:4px;}
  .admit-eligibility{margin-top:26px;font-size:14.5px;color:#D9E1EE;max-width:640px;}
  @media (max-width:880px){.timeline{grid-template-columns:repeat(2,1fr);} .admissions{padding:28px 20px;}}

  .cal-list{display:flex;flex-direction:column;gap:12px;}
  .cal-row{display:flex;align-items:center;gap:18px;background:#fff;border:1px solid var(--line);border-left:4px solid var(--ink-soft);border-radius:4px;padding:14px 18px;flex-wrap:wrap;}
  .cal-date{font-weight:700;color:var(--navy);font-size:13.5px;min-width:170px;}
  .cal-body{flex:1;min-width:200px;}
  @media (max-width:480px){
    .cal-date{min-width:0;width:100%;}
    .cal-body{min-width:0;width:100%;}
  }
  .cal-title{font-weight:600;font-size:14.5px;}
  .cal-desc{font-size:13px;color:var(--ink-soft);margin-top:2px;}
  .cal-tag{color:#fff;font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;padding:4px 10px;border-radius:20px;flex-shrink:0;}

  .placement-stat{text-align:center;background:var(--navy);color:#fff;border-radius:var(--radius);padding:28px;margin-bottom:28px;}
  .placement-stat .num{font-family:'Lora',serif;font-size:40px;font-weight:700;color:var(--marigold);}
  .placement-stat .label{font-size:13px;color:#D9E1EE;text-transform:uppercase;letter-spacing:.06em;margin-top:4px;}
  .recruiter-grid{display:flex;flex-wrap:wrap;gap:12px;justify-content:center;}
  .recruiter-chip{display:flex;align-items:center;gap:8px;background:#fff;border:1px solid var(--line);border-radius:24px;padding:10px 18px;font-weight:600;font-size:13.5px;box-shadow:var(--shadow);}
  .recruiter-chip img{width:22px;height:22px;border-radius:50%;object-fit:cover;}

  .testi-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:22px;}
  .testi-card{background:#fff;border:1px solid var(--line);border-radius:var(--radius);padding:26px 24px;box-shadow:var(--shadow);}
  .testi-quote-mark{font-family:'Lora',serif;font-size:48px;color:var(--marigold);line-height:1;margin-bottom:-10px;}
  .testi-quote{font-size:14.5px;color:var(--ink-soft);font-style:italic;}
  .testi-person{display:flex;align-items:center;gap:12px;margin-top:14px;}
  .testi-avatar{width:44px;height:44px;border-radius:50%;overflow:hidden;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:14px;font-family:'Lora',serif;flex-shrink:0;}
  .testi-avatar img{width:100%;height:100%;object-fit:cover;}
  .testi-name{font-weight:700;font-size:13.5px;color:var(--navy);}
  .testi-role{font-size:12px;color:var(--ink-soft);}
  @media (max-width:880px){.testi-grid{grid-template-columns:1fr 1fr;}}
  @media (max-width:560px){.testi-grid{grid-template-columns:1fr;}}

  .faculty-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:22px;}
  .faculty-card{background:#fff;border:1px solid var(--line);border-radius:var(--radius);padding:22px;text-align:center;box-shadow:var(--shadow);transition:transform .22s ease, box-shadow .22s ease;}
  .faculty-card:hover{transform:translateY(-4px);box-shadow:var(--shadow-lg);}
  .faculty-avatar{width:88px;height:88px;border-radius:50%;margin:0 auto 14px;overflow:hidden;display:flex;align-items:center;justify-content:center;color:#fff;font-family:'Lora',serif;font-weight:700;font-size:26px;}
  .faculty-avatar img{width:100%;height:100%;object-fit:cover;}
  .faculty-card h4{font-size:15.5px;margin-bottom:2px;}
  .faculty-card .desig{font-size:13px;color:var(--marigold-dark);font-weight:700;margin-bottom:6px;}
  .faculty-card .qual{font-size:12.5px;color:var(--ink-soft);}
  @media (max-width:880px){.faculty-grid{grid-template-columns:1fr 1fr;}}
  @media (max-width:560px){.faculty-grid{grid-template-columns:1fr;}}

  .noticeboard{background:var(--paper-dark);border:1px solid var(--line);border-radius:var(--radius);padding:36px 30px;}
  .notice-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:24px;}
  .notice-card{background:#fffdf7;border:1px solid #e2d9bd;border-radius:2px;padding:18px 18px 20px;box-shadow:0 3px 8px rgba(0,0,0,.08);position:relative;transition:transform .2s ease;}
  .notice-card:nth-child(odd){transform:rotate(-1deg);}
  .notice-card:nth-child(even){transform:rotate(1deg);}
  .notice-card:hover{transform:rotate(0deg) translateY(-3px);}
  .notice-card::before{content:'';position:absolute;top:-8px;left:50%;transform:translateX(-50%);width:16px;height:16px;border-radius:50%;background:var(--brick);box-shadow:0 2px 3px rgba(0,0,0,.3);}
  .notice-card:target{outline:3px solid var(--marigold);outline-offset:3px;}
  .notice-date{font-size:11.5px;font-weight:700;color:var(--ink-soft);text-transform:uppercase;letter-spacing:.04em;}
  .notice-card h4{font-size:15px;margin:6px 0 8px;}
  .notice-card p{font-size:13px;color:var(--ink-soft);margin:0;}
  .notice-important{display:inline-block;background:var(--brick);color:#fff;font-size:10.5px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;padding:2px 8px;border-radius:2px;margin-bottom:6px;}
  .notice-pdf-link{display:inline-block;margin-top:8px;font-size:12.5px;font-weight:700;color:var(--brick);text-decoration:underline;}
  @media (max-width:880px){.notice-grid{grid-template-columns:1fr 1fr;}}
  @media (max-width:560px){.notice-grid{grid-template-columns:1fr;}}

  .result-list, .download-list{display:flex;flex-direction:column;gap:10px;}
  .result-row, .download-row{display:flex;align-items:center;gap:16px;background:#fff;border:1px solid var(--line);border-radius:4px;padding:14px 18px;flex-wrap:wrap;}
  .rtitle,.dtitle{font-weight:600;font-size:14.5px;}
  .rmeta,.dcat{font-size:12.5px;color:var(--ink-soft);margin-top:2px;}
  .pdf-badge{background:var(--brick);color:#fff;font-size:10.5px;font-weight:800;letter-spacing:.04em;padding:5px 9px;border-radius:3px;flex-shrink:0;}

  .gallery-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;}
  .gallery-item{aspect-ratio:1/1;border-radius:var(--radius);overflow:hidden;border:1px solid var(--line);background:#fff;cursor:zoom-in;position:relative;}
  .gallery-item img{width:100%;height:100%;object-fit:cover;transition:transform .35s ease;}
  .gallery-item:hover img{transform:scale(1.07);}
  .gallery-caption{font-size:11.5px;color:var(--ink-soft);padding:6px 2px 0;}

const memoryStorage = (function(){
  const store = {};
  return {
    getItem:(k)=> (k in store ? store[k] : null),
    setItem:(k,v)=>{ store[k]=v; },
    removeItem:(k)=>{ delete store[k]; }
  };
})();

function initSupabase(){
  if(!SUPABASE_URL || !SUPABASE_ANON_KEY || SUPABASE_URL.indexOf('YOUR_')===0 || SUPABASE_ANON_KEY.indexOf('YOUR_')===0){
    configOK = false;
    return;
  }
  try{
    sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
      auth: { storage: memoryStorage, persistSession: true, autoRefreshToken: true, detectSessionInUrl: false }
    });
    configOK = true;
  }catch(e){
    configOK = false;
  }
}

async function dbSelectSingleton(table){
  try{
    const { data, error } = await sb.from(table).select('*').eq('id',1).maybeSingle();
    if(error) throw error;
    return data;
  }catch(e){ console.error(table, e); dbErrors.push(table + ': ' + (e.message||'failed to load')); return null; }
}
async function dbUpdateSingleton(table, payload){
  try{
    const { error } = await sb.from(table).update(payload).eq('id',1);
    if(error) throw error;
    return true;
  }catch(e){ console.error(table, e); return false; }
}
async function dbSelectList(table, orderCol, ascending){
  try{
    let q = sb.from(table).select('*');
    if(orderCol) q = q.order(orderCol, {ascending: !!ascending});
    const { data, error } = await q;
    if(error) throw error;
    return data || [];
  }catch(e){ console.error(table, e); dbErrors.push(table + ': ' + (e.message||'failed to load')); return []; }
}
async function dbInsert(table, payload){
  try{
    const { data, error } = await sb.from(table).insert(payload).select();
    if(error) throw error;
    return (data && data[0]) || true;
  }catch(e){ console.error(table, e); return null; }
}
async function dbUpdate(table, id, payload){
  try{
    const { error } = await sb.from(table).update(payload).eq('id', id);
    if(error) throw error;
    return true;
  }catch(e){ console.error(table, e); return false; }
}
async function dbDelete(table, id){
  try{
    const { error } = await sb.from(table).delete().eq('id', id);
    if(error) throw error;
    return true;
  }catch(e){ console.error(table, e); return false; }
}

function compressImageToDataUrl(file, maxDim, quality){
  return new Promise((resolve, reject)=>{
    const reader = new FileReader();
    reader.onload = (e)=>{
      const img = new Image();
      img.onload = ()=>{
        let w = img.width, h = img.height;
        if(w > h){ if(w > maxDim){ h = Math.round(h * maxDim / w); w = maxDim; } }
        else { if(h > maxDim){ w = Math.round(w * maxDim / h); h = maxDim; } }
        const canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
        resolve(canvas.toDataURL('image/jpeg', quality));
      };
      img.onerror = ()=>reject(new Error('Could not read that image.'));
      img.src = e.target.result;
    };
    reader.onerror = ()=>reject(new Error('Could not read that file.'));
    reader.readAsDataURL(file);
  });
}

async function uploadToStorage(file, folder, opts){
  opts = opts || {};
  if(!file) throw new Error('No file selected.');
  const isPdf = !!opts.isPdf;
  if(isPdf){
    if(file.type !== 'application/pdf') throw new Error('Please choose a PDF file.');
    if(file.size > 15*1024*1024) throw new Error('That PDF is too large (max 15MB).');
  } else {
    if(!file.type || !file.type.startsWith('image/')) throw new Error('Please choose an image file.');
    if(file.size > 10*1024*1024) throw new Error('That image is too large (max 10MB).');
  }
  let blob = file, ext = 'pdf', contentType = 'application/pdf';
  if(!isPdf){
    const dataUrl = await compressImageToDataUrl(file, opts.maxDim||700, opts.quality||0.78);
    blob = await (await fetch(dataUrl)).blob();
    ext = 'jpg'; contentType = 'image/jpeg';
  }
  const path = folder + '/' + Date.now().toString(36) + '-' + Math.random().toString(36).slice(2,8) + '.' + ext;
  const { error } = await sb.storage.from(STORAGE_BUCKET).upload(path, blob, { cacheControl:'3600', upsert:false, contentType });
  if(error) throw error;
  const { data } = sb.storage.from(STORAGE_BUCKET).getPublicUrl(path);
  return data.publicUrl;
}

async function checkSession(){
  try{
    const { data } = await sb.auth.getSession();
    session.isAdmin = !!(data && data.session);
  }catch(e){ session.isAdmin = false; }
}
async function handleLogin(e){
  e.preventDefault();
  const email = e.target.email.value.trim();
  const pw = e.target.pw.value;
  try{
    const { error } = await sb.auth.signInWithPassword({ email, password: pw });
    if(error) throw error;
    session.isAdmin = true;
    adminTab = 'info';
    pushToast('success','Welcome back.');
  }catch(err){
    pushToast('error', err.message || 'Incorrect email or password.');
  }
  renderApp();
  return false;
}
async function handleLogout(){
  try{ await sb.auth.signOut(); }catch(e){}
  session.isAdmin = false;
  location.hash = '#home';
  pushToast('success','You have been logged out.');
  renderApp();
}
async function handleChangePassword(e){
  e.preventDefault();
  const f = e.target;
  if(f.next.value !== f.confirm.value){ pushToast('error','New passwords do not match.'); renderApp(); return false; }
  if(f.next.value.length < 8){ pushToast('error','New password should be at least 8 characters.'); renderApp(); return false; }
  try{
    const { error } = await sb.auth.updateUser({ password: f.next.value });
    if(error) throw error;
    pushToast('success','Password updated.');
  }catch(err){
    pushToast('error', err.message || 'Could not update password.');
  }
  renderApp();
  return false;
}

function injectStructuredData(){
  const el = document.getElementById('ldjson');
  if(!el) return;
  try{
    el.textContent = JSON.stringify({
      "@context":"https://schema.org",
      "@type":"EducationalOrganization",
      "name": info.name,
      "description": info.tagline,
      "foundingDate": info.established,
      "address": { "@type":"PostalAddress", "streetAddress": info.address },
      "telephone": info.phone,
      "email": info.email
    });
  }catch(e){ /* non-critical */ }
}

function esc(s){
  return String(s===undefined||s===null?'':s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}
function initials(name){
  const parts = String(name||'').replace(/^(Dr\.|Er\.|Mr\.|Mrs\.|Ms\.)\s*/i,'').trim().split(/\s+/);
  return (parts[0]?.[0]||'').toUpperCase() + (parts[1]?.[0]||'').toUpperCase();
}
function colorFromString(str){
  const palette = ['#16305C','#1F7A4D','#A6432E','#C77F1D','#5B4B8A','#0E1F3D'];
  let h=0; for(let i=0;i<String(str).length;i++) h = String(str).charCodeAt(i) + ((h<<5)-h);
  return palette[Math.abs(h)%palette.length];
}
function fmtDate(iso){
  if(!iso) return '';
  try{
    const d = new Date(iso+'T00:00:00');
    return d.toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'});
  }catch(e){ return iso; }
}
function fmtDateTime(iso){
  if(!iso) return null;
  try{
    const d = new Date(iso);
    return d.toLocaleString('en-IN',{day:'numeric',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'});
  }catch(e){ return null; }
}
const BLANK_PX = "data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///ywAAAAAAQABAAACAUwAOw==";
function parseStatNumber(str){
  const m = String(str||'').match(/^([\d,]+)(.*)$/);
  if(!m) return null;
  const num = parseInt(m[1].replace(/,/g,''),10);
  if(isNaN(num)) return null;
  return { num, suffix: m[2] || '' };
}

function renderApp(){
  const app = document.getElementById('app');
  if(!configOK){
    document.title = 'Setup Required — Vidya Education Group';
    app.innerHTML = renderSetupScreen();
    return;
  }
  if(!dataLoaded){
    app.innerHTML = renderLoading();
    return;
  }
  if(location.hash.startsWith('#admin')){
    document.title = 'Admin Panel — ' + info.name;
    app.innerHTML = session.isAdmin ? renderAdminDashboard() : renderAdminLogin();
  } else {
    document.title = info.name + ' — Diploma Engineering, Bihar';
    app.innerHTML = renderPublicSite();
  }
  bindGlobalEvents();
}

function renderCalendar(){

      <div class="cal-body"><div class="cal-title">${esc(e.title)}</div>${e.description?`<div class="cal-desc">${esc(e.description)}</div>`:''}${e.pdf_url?`<a class="notice-pdf-link" href="${e.pdf_url}" target="_blank" rel="noopener">View attached PDF</a>`:''}</div>
      <div class="cal-tag" style="background:${catColor[e.category]||'var(--ink-soft)'};">${esc(e.category||'Event')}</div>

function renderAdminDashboard(){
  const tabs = [
    ['info','Institution Details','info'],
    ['about','Vision & Mission','about'],
    ['leadership','Leadership','about'],
    ['achievements','Milestones & Achievements','achievements'],
    ['courses','Courses','courses'],
    ['faculty','Faculty','faculty'],
    ['notices','Notices','notices'],
    ['results','Results','results'],
    ['calendar_events','Academic Calendar','calendar'],
    ['gallery','Gallery','gallery'],
    ['recruiters','Placements & Recruiters','placements'],
    ['testimonials','Testimonials','testimonials'],
    ['downloads','Downloads','downloads'],
    ['committees','Committees & Disclosure','committees'],
    ['enquiries','Enquiries','enquiries'],
    ['account','Account & Security','account']
  ];
  const tabBtns = tabs.map(([key,label,icon]) => `<button class="${adminTab===key?'active':''}" onclick="setAdminTab('${key}')">${ICONS[icon]}<span>${label}</span></button>`).join('');

  let panel;
  if(adminTab==='info') panel = renderAdminInfo();
  else if(adminTab==='about') panel = renderAdminAbout();
  else if(adminTab==='courses') panel = renderAdminCourses();
  else if(adminTab==='faculty') panel = renderAdminFaculty();
  else if(adminTab==='notices') panel = renderAdminNotices();
  else if(adminTab==='gallery') panel = renderAdminGallery();
  else if(adminTab==='enquiries') panel = renderAdminEnquiries();
  else if(adminTab==='account') panel = renderAdminAccount();
  else if(SIMPLE_SECTIONS[adminTab]) panel = renderGenericAdmin(adminTab);
  else panel = '';

  return `
  <div class="admin-topbar">
    <div class="container">
      <span class="lbl">${ICONS.account}ADMIN MODE — editing ${esc(info.name)}</span>
      <span class="actions"><a href="#home">View site</a><button onclick="handleLogout()">Log out</button></span>
    </div>
  </div>
  <div class="admin-wrap">
    ${dbErrors.length ? `<div class="toast error" style="position:static;display:block;margin-bottom:16px;"><b>Could not load from these tables:</b> ${esc(dbErrors.join('; '))}.<br>Check that the SQL setup script ran fully, that Row Level Security policies exist for these tables, and that they are exposed under Project Settings → Data API.</div>` : ''}
    <div class="admin-shell">
      <div class="admin-sidebar"><div class="admin-tabs">${tabBtns}</div></div>
      <div class="admin-panel">${panel}</div>
    </div>
  </div>
  ${renderToast()}`;
}

function genericTitle(key, r){
  if(key==='recruiters') return r.company_name;
  if(key==='committees') return r.name;
  if(key==='testimonials') return r.name;
  if(key==='achievements') return r.title;
  if(key==='leadership') return r.name;
  return r.title;
}
function genericSubtitle(key, r){
  if(key==='results') return [r.branch, r.semester?`Sem ${r.semester}`:null, r.published_date?fmtDate(r.published_date):null].filter(Boolean).join(' · ');
  if(key==='calendar_events') return [fmtDate(r.event_date), r.end_date?('to '+fmtDate(r.end_date)):null, r.category].filter(Boolean).join(' · ');
  if(key==='recruiters') return 'Display order ' + (r.sort_order||0);
  if(key==='downloads') return r.category || '';
  if(key==='committees') return r.members ? String(r.members).split('\n').filter(Boolean).length + ' member(s) listed' : 'No members listed yet';
  if(key==='testimonials') return r.role || '';
  if(key==='achievements') return r.year || '';
  if(key==='leadership') return r.title || '';
  return '';
}

function renderGenericAdmin(key){
  const cfg = SIMPLE_SECTIONS[key];
  const rows = tableData[key] || [];
  const editingId = window['_editing_'+key] || null;
  const editingData = window['_editingData_'+key] || null;

  const rowsHtml = rows.map(r => `
    <div class="item-row">
      <div class="info" style="flex:1;"><b>${esc(genericTitle(key,r))}</b><br>${esc(genericSubtitle(key,r))}</div>
      <div class="btns"><button class="btn-ghost" onclick='openEditGeneric("${key}","${r.id}")'>Edit</button><button class="btn-danger" onclick="deleteGeneric('${key}','${r.id}')">Delete</button></div>
    </div>`).join('');

  const fieldsHtml = cfg.fields.map(f=>{
    const val = editingData ? (editingData[f.name] ?? '') : '';
    if(f.type==='textarea') return `<div class="field full"><label>${f.label}</label><textarea name="${f.name}" ${f.required?'required':''}>${esc(val)}</textarea></div>`;
    if(f.type==='select'){
      const opts = f.options.map(o=>`<option value="${esc(o)}" ${val===o?'selected':''}>${esc(o)}</option>`).join('');
      return `<div class="field"><label>${f.label}</label><select name="${f.name}">${opts}</select></div>`;
    }
    return `<div class="field"><label>${f.label}</label><input type="${f.type}" name="${f.name}" value="${esc(val)}" placeholder="${esc(f.placeholder||'')}" ${f.required?'required':''}></div>`;
  }).join('');

  let fileHtml = '';
  if(cfg.file){
    const hasFile = editingData && editingData[cfg.file.name];
    if(cfg.file.kind === 'pdf'){
      fileHtml = `<div class="field"><label>${cfg.file.label}</label>
        <input type="file" accept="application/pdf" onchange="handleGenericFilePick('${key}', event)">
        <div class="hint" id="genericFileStatus_${key}">${hasFile ? 'A PDF is already attached. Choosing a new file will replace it.' : ''}</div></div>`;
    } else {
      fileHtml = `<div class="field"><label>${cfg.file.label}</label>
        <div class="file-row">
          <img class="file-preview" id="genericFilePreview_${key}" src="${hasFile || BLANK_PX}" style="${hasFile?'':'display:none;'}">
          <input type="file" accept="image/*" onchange="handleGenericFilePick('${key}', event)">
        </div>
        <div class="hint" id="genericFileStatus_${key}"></div></div>`;
    }
  }

  return `
  <h3>${ICONS[cfg.icon]}${cfg.label}</h3>
  <p class="sub">Add, edit or remove entries shown on the public site.</p>
  ${lastTouchedLine()}
  ${rows.length ? rowsHtml : '<p class="hint">Nothing here yet — add the first entry below.</p>'}
  <div class="add-form">
    <h4 style="font-size:15px;">${editingId ? 'Edit entry' : 'Add a new entry'}</h4>
    <form onsubmit="return handleGenericSave('${key}', event)">
      <div class="form-grid">${fieldsHtml}</div>
      ${fileHtml}
      <button type="submit" class="btn-admin">${editingId ? 'Save' : 'Add'}</button>
      ${editingId ? `<button type="button" class="btn-ghost" onclick="cancelEditGeneric('${key}')">Cancel</button>` : ''}
    </form>
  </div>`;
}

async function handleGenericFilePick(key, e){
  const cfg = SIMPLE_SECTIONS[key];
  const file = e.target.files[0];
  if(!file) return;
  const statusEl = document.getElementById('genericFileStatus_'+key);
  if(statusEl) statusEl.textContent = 'Uploading...';
  try{
    const url = await uploadToStorage(file, key, { isPdf: cfg.file.kind==='pdf', maxDim:700, quality:0.8 });
    window['_editingData_'+key] = {...(window['_editingData_'+key]||{}), [cfg.file.name]: url};
    if(cfg.file.kind !== 'pdf'){
      const img = document.getElementById('genericFilePreview_'+key);
      if(img){ img.src = url; img.style.display = 'block'; }
    }
    if(statusEl) statusEl.textContent = 'Uploaded.';
  }catch(err){
    if(statusEl) statusEl.textContent = err.message || 'Upload failed.';
  }
}
async function handleGenericSave(key, e){
  e.preventDefault();
  const cfg = SIMPLE_SECTIONS[key];
  const f = e.target;
  const editingId = window['_editing_'+key];
  const editingData = window['_editingData_'+key];
  if(cfg.file && cfg.file.required && !editingId && !(editingData && editingData[cfg.file.name])){
    pushToast('error','Please choose a file first.');
    renderApp();
    return false;
  }
  const payload = {};
  cfg.fields.forEach(field=>{
    if(field.type==='number') payload[field.name] = parseInt(f[field.name].value,10) || 0;
    else payload[field.name] = f[field.name].value.trim();
  });
  if(cfg.file && editingData && editingData[cfg.file.name]) payload[cfg.file.name] = editingData[cfg.file.name];

  let ok;
  if(editingId){
    ok = await dbUpdate(cfg.table, editingId, payload);
  } else {
    ok = !!(await dbInsert(cfg.table, payload));
  }
  if(ok){
    tableData[key] = await dbSelectList(cfg.table, cfg.orderCol, cfg.ascending);
    await touchLastUpdated();
  }
  window['_editing_'+key] = null;
  window['_editingData_'+key] = null;
  pushToast(ok?'success':'error', ok?'Saved.':'Could not save changes.');
  renderApp();
  return false;
}
async function deleteGeneric(key, id){
  if(!confirm('Delete this entry? This cannot be undone.')) return;
  const cfg = SIMPLE_SECTIONS[key];
  const ok = await dbDelete(cfg.table, id);
  if(ok){
    tableData[key] = tableData[key].filter(r=>String(r.id)!==String(id));
    await touchLastUpdated();
  }
  pushToast(ok?'success':'error', ok?'Deleted.':'Could not delete.');
  renderApp();
}

function bindGlobalEvents(){
  window.onhashchange = renderApp;
  document.onkeydown = (e)=>{
    if(e.key === 'Escape'){
      if(lightboxIndex !== null){ closeLightbox(); }
      else if(navOpen){ closeNav(); }
    }
    if(lightboxIndex !== null){
      if(e.key === 'ArrowRight') navigateLightbox(1);
      if(e.key === 'ArrowLeft') navigateLightbox(-1);
    }
  };
  if(configOK && dataLoaded && !location.hash.startsWith('#admin')){
    setupReveal();
    setupScrollSpy();
    setupCounters();
  }
}
function setupReveal(){
  const els = document.querySelectorAll('.reveal:not(.in-view)');
  if(!('IntersectionObserver' in window)){ els.forEach(el=>el.classList.add('in-view')); return; }
  const obs = new IntersectionObserver((entries)=>{
    entries.forEach(entry=>{ if(entry.isIntersecting){ entry.target.classList.add('in-view'); obs.unobserve(entry.target); } });
  }, {threshold:0.12});
  els.forEach(el=>obs.observe(el));
}
function setupScrollSpy(){
  const sections = document.querySelectorAll('main section[id], section.hero#home');
  const navLinks = document.querySelectorAll('nav.main-nav a[href^="#"]:not(.nav-cta)');
  if(!sections.length || !navLinks.length || !('IntersectionObserver' in window)) return;
  const obs = new IntersectionObserver((entries)=>{
    entries.forEach(entry=>{
      if(entry.isIntersecting){
        const id = '#'+entry.target.id;
        navLinks.forEach(a=> a.classList.toggle('active', a.getAttribute('href')===id));
      }
    });
  }, {rootMargin:'-45% 0px -50% 0px', threshold:0});
  sections.forEach(s=>obs.observe(s));
}
function setupCounters(){
  const strip = document.querySelector('.stat-strip');
  if(!strip || !('IntersectionObserver' in window)) return;
  const obs = new IntersectionObserver((entries)=>{
    entries.forEach(entry=>{
      if(!entry.isIntersecting) return;
      document.querySelectorAll('.stat .num[data-count]').forEach(el=>{
        const target = parseInt(el.dataset.count,10);
        const suffix = el.dataset.suffix || '';
        if(isNaN(target)) return;
        let cur = 0;
        const step = Math.max(1, Math.round(target/36));
        (function tick(){
          cur += step;
          if(cur>=target){ el.textContent = target.toLocaleString('en-IN') + suffix; return; }
          el.textContent = cur.toLocaleString('en-IN');
          requestAnimationFrame(tick);
        })();
      });
      obs.unobserve(entry.target);
    });
  }, {threshold:0.3});
  obs.observe(strip);
}

async function handleSaveFaculty(e){
  e.preventDefault();
  const f = e.target;
  const payload = {
    name: f.name.value.trim(), designation: f.designation.value.trim(),
    department: f.department.value.trim(), qualification: f.qualification.value.trim(),
    photo_url: (window._editingFacultyData && window._editingFacultyData.photo_url) || ''
  };
  const editingId = window._editingFaculty;
  const ok = editingId ? await dbUpdate('faculty', editingId, payload) : !!(await dbInsert('faculty', payload));
  if(ok){ faculty = await dbSelectList('faculty','created_at',true); await touchLastUpdated(); }
  window._editingFaculty = null; window._editingFacultyData = null;
  pushToast(ok?'success':'error', ok?'Faculty profile saved.':'Could not save changes.');
  renderApp();
  return false;
}
async function deleteFaculty(id){
  if(!confirm('Remove this faculty member? This cannot be undone.')) return;
  const ok = await dbDelete('faculty', id);
  if(ok){ faculty = faculty.filter(x=>String(x.id)!==String(id)); await touchLastUpdated(); }
  pushToast(ok?'success':'error', ok?'Faculty member removed.':'Could not delete.');
  renderApp();
}

function openEditNotice(id){
  const n = notices.find(x=>String(x.id)===String(id));
  if(!n) return;
  window._editingNotice = id; window._editingNoticeData = {...n};
  renderApp();
}
function cancelEditNotice(){ window._editingNotice = null; window._editingNoticeData = null; renderApp(); }
async function handleNoticePdfPick(e){
  const file = e.target.files[0];
  if(!file) return;
  const statusEl = document.getElementById('noticePdfStatus');
  if(statusEl) statusEl.textContent = 'Uploading...';
  try{
    const url = await uploadToStorage(file, 'notices', {isPdf:true});
    window._pendingNoticePdf = url;
    if(statusEl) statusEl.textContent = 'PDF ready — click "Post notice" / "Save notice" below to apply it.';
  }catch(err){
    if(statusEl) statusEl.textContent = err.message || 'Upload failed.';
  }
}
async function handleSaveNotice(e){
  e.preventDefault();
  const f = e.target;
  const payload = {
    title: f.title.value.trim(), notice_date: f.notice_date.value || new Date().toISOString().slice(0,10),
    content: f.content.value.trim(), important: !!f.important.checked,
    pdf_url: window._pendingNoticePdf || (window._editingNoticeData && window._editingNoticeData.pdf_url) || null
  };
  const editingId = window._editingNotice;
  const ok = editingId ? await dbUpdate('notices', editingId, payload) : !!(await dbInsert('notices', payload));
  if(ok){ notices = await dbSelectList('notices','notice_date',false); await touchLastUpdated(); }
  window._editingNotice = null; window._editingNoticeData = null; window._pendingNoticePdf = null;
  pushToast(ok?'success':'error', ok?'Notice saved.':'Could not save changes.');
  renderApp();
  return false;
}
async function deleteNotice(id){
  if(!confirm('Delete this notice?')) return;
  const ok = await dbDelete('notices', id);
  if(ok){ notices = notices.filter(x=>String(x.id)!==String(id)); await touchLastUpdated(); }
  pushToast(ok?'success':'error', ok?'Notice deleted.':'Could not delete.');
  renderApp();
}

async function handleGalleryPhotoPick(e){
  const file = e.target.files[0];
  if(!file) return;
  const statusEl = document.getElementById('galleryPhotoStatus');
  if(statusEl) statusEl.textContent = 'Uploading...';
  try{
    const url = await uploadToStorage(file, 'gallery', {maxDim:900, quality:0.75});
    window._pendingGalleryPhoto = url;
    const img = document.getElementById('galleryPhotoPreview');
    img.src = url; img.style.display = 'block';
    if(statusEl) statusEl.textContent = 'Uploaded — add a caption and click "Add photo".';
  }catch(err){
    if(statusEl) statusEl.textContent = err.message || 'Upload failed.';
  }
}
async function handleAddGalleryPhoto(e){
  e.preventDefault();
  if(!window._pendingGalleryPhoto){ pushToast('error','Choose a photo first.'); renderApp(); return false; }
  const caption = e.target.caption.value.trim();
  const inserted = await dbInsert('gallery', {photo_url: window._pendingGalleryPhoto, caption});
  if(inserted){ gallery = await dbSelectList('gallery','created_at',false); await touchLastUpdated(); }
  window._pendingGalleryPhoto = null;
  pushToast(inserted?'success':'error', inserted?'Photo added to gallery.':'Could not save changes.');
  renderApp();
  return false;
}
async function deleteGalleryItem(id){
  if(!confirm('Delete this photo?')) return;
  const ok = await dbDelete('gallery', id);
  if(ok){ gallery = gallery.filter(g=>String(g.id)!==String(id)); await touchLastUpdated(); }
  pushToast(ok?'success':'error', ok?'Photo deleted.':'Could not delete.');
  renderApp();
}

/* ---- Public enquiry form ---- */
async function handleSubmitEnquiry(e){
  e.preventDefault();
  const f = e.target;
  const payload = {
    name: f.name.value.trim(),
    phone: f.phone.value.trim(),
    email: f.email.value.trim(),
    course_interested: f.course_interested.value,
    message: f.message.value.trim(),
    status: 'new'
  };
  const inserted = await dbInsert('enquiries', payload);
  pushToast(inserted?'success':'error', inserted?"Thank you! We've received your enquiry and will get back to you soon.":'Could not send your enquiry right now. Please try calling or emailing us directly.');
  renderApp();
  return false;
}

/* ---- Admin: Enquiries ---- */
async function markEnquiryContacted(id){
  const ok = await dbUpdate('enquiries', id, {status:'contacted'});
  if(ok){ tableData.enquiries = (tableData.enquiries||[]).map(en => String(en.id)===String(id) ? {...en, status:'contacted'} : en); }
  pushToast(ok?'success':'error', ok?'Marked as contacted.':'Could not update.');
  renderApp();
}
async function deleteEnquiry(id){
  if(!confirm('Delete this enquiry? This cannot be undone.')) return;
  const ok = await dbDelete('enquiries', id);
  if(ok){ tableData.enquiries = (tableData.enquiries||[]).filter(en=>String(en.id)!==String(id)); }
  pushToast(ok?'success':'error', ok?'Deleted.':'Could not delete.');
  renderApp();
}
